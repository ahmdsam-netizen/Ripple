# to run this file -- docker compose -f docker-compose-multiple.yml up

services:
  app1: 
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ripple-app1
    env_file:
      - .env
    environment:
      INSTANCE_ID: app1
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
      pub-sub:
        condition: service_healthy

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ripple-app2
    env_file:
      - .env
    environment:
      INSTANCE_ID: app2
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - 3001:3000
    depends_on:
      db:
        condition: service_healthy
      pub-sub:
        condition: service_healthy

  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ripple-app3
    env_file:
      - .env
    environment:
      INSTANCE_ID: app3
      NEXTAUTH_URL: http://localhost:3002
    ports:
      - 3002:3000
    depends_on:
      db:
        condition: service_healthy
      pub-sub:
        condition: service_healthy

  db: 
    image: postgres:alpine
    container_name: ripple-database
    restart: always
    environment:
      POSTGRES_USER: sayem 
      POSTGRES_PASSWORD: sayemahmad
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sayem -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  pub-sub:
    image: redis:latest
    container_name: ripple-pub-sub
    restart:  always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
